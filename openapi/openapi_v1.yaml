openapi: 3.1.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: Enhancely API
  version: "1.5.0"
  x-logo:
    url: enhancely-logo.png
    altText: Enhancely Logo
    backgroundColor: "#FFFFFF"
    href: https://enhancely.ai
  description: |
    ## Overview

    The Enhancely API provides automatic generation and retrieval of Schema.org JSON-LD structured data for your web pages. This structured data helps search engines, AI platforms, and AI search tools better understand and represent your content.

    ## Quick Start Guide

    ### How It Works

    <div style="text-align: center; margin: 20px 0;">
      <img src="api-workflow-sequence.svg" alt="Enhancely API Workflow Sequence Diagram" style="max-width: 100%; height: auto;" />
    </div>

    ### Get Started in 3 Steps

    **1. Get Your API Key** - Log in to the [Enhancely Dashboard](https://enhancely.ai), add your domain, verify ownership, and copy your project API key.

    **2. Make Your First Request** - POST your page URL to `/api/v1/jsonld` with your API key. First request returns 201 (queued for processing). Wait a few minutes, then request again to get 200 with your generated JSON-LD.

    **3. Integrate Into Your Website** - Add the returned JSON-LD in a `<script type="application/ld+json">` tag in your page's `<head>` section. Implement caching with ETags for production.

    ### Key Benefits

    - **Automatic Updates**: Nightly crawls detect content changes and regenerate JSON-LD
    - **Explicit Change Signals**: CMS hooks can request a fresh crawl immediately after publishing
    - **Efficient Caching**: ETag-based validation minimizes bandwidth and API calls
    - **Always Fresh**: Your structured data stays synchronized with page content
    - **Minimal Maintenance**: Automatic nightly updates with manual cache clearing only when you update content


    ## Prerequisites

    This API is exclusively available to Enhancely customers who have:
    1. Added their domain to the Enhancely platform
    2. Validated domain ownership
    3. Retrieved their project API key from the Enhancely Dashboard

    ## Integration Approaches

    ### POST vs GET: Which Endpoint to Use

    **Use POST /api/v1/jsonld for CMS & Website Integration:**
    - Primary endpoint for page-level integration
    - Automatically creates records if they don't exist
    - Supports sending complex URLs in request body (no query string length limits)
    - Returns `412 Precondition Failed` when ETag matches (cache valid)
    - Ideal for server-side rendering in templates

    **Use GET /api/v1/jsonld for:**
    - Listing all JSON-LD records across your project
    - Filtering by status, URL, hash, ETag, readonly, or timestamps
    - Paginated results with cursor-based navigation

    **Use GET /api/v1/jsonld/{hash} for:**
    - Polling processing status after receiving 201/202 from POST
    - Direct retrieval when you already have the MD5 hash
    - Returns `202 Accepted` while JSON-LD generation is still in progress
    - Returns `304 Not Modified` when ETag matches (cache valid)

    ### CMS Plugins & Website Integration (Recommended)

    For integrating Enhancely into your website or CMS, follow this pattern:

    1. **Template Integration**: Add the API call in your page template's `<head>` section
    2. **URL Normalization**: Strip query parameters, hashes, and trailing slashes before caching
    3. **Cache-First Strategy**: Check local cache before making API requests (recommended TTL: 1 week)
    4. **Cache Key Generation**: Use MD5 hash of the normalized URL as the cache key
    5. **ETag Validation**: Always send `If-None-Match` header with cached ETag
    6. **Silent Degradation**: Return empty output on errors to avoid breaking page rendering
    7. **Content Change Signal**: After your CMS publishes a page update, send `content_changed: true` once and clear your local JSON-LD cache. Enhancely coalesces duplicate notifications for the same URL.
    8. **Cache Invalidation**: Auto-clear cache in local/development environments for testing.

    **Note**: Enhancely automatically checks all indexed URLs nightly. Use the explicit change signal only when your CMS knows that a page was published and you want a fresh crawl before the next nightly check.

    ## Cache Strategy

    Enhancely uses HTTP ETag-based caching:

    ### HTTP-Level Caching (ETags)

    Every JSON-LD response includes an `ETag` header—a unique identifier for that version of the content. Use ETags for efficient caching:

    ```http
    # First request
    POST /api/v1/jsonld
    Authorization: Bearer YOUR_API_KEY
    Content-Type: application/json
    Accept: application/json

    {"url": "https://example.com/page"}

    HTTP/1.1 200 OK
    ETag: "a1b2c3d4e5f6"
    Content-Type: application/json

    {
      "hash": "7c165c13f93d7ca168bcfbd73cf563e3",
      "url": "https://example.com/page",
      "jsonld": {...},
      "etag": "a1b2c3d4e5f6",
      "crawled_at": "2025-01-16T14:30:00Z",
      "http_status_code": 200,
      "status": "ready",
      "readonly": false
    }
    ```

    ```http
    # Subsequent request with cached ETag
    POST /api/v1/jsonld
    Authorization: Bearer YOUR_API_KEY
    Content-Type: application/json
    Accept: application/json
    If-None-Match: "a1b2c3d4e5f6"

    {"url": "https://example.com/page"}

    HTTP/1.1 412 Precondition Failed
    ```

    **Benefits:**
    - `412 Precondition Failed` responses include minimal Problem body indicating cache is valid
    - Avoids redundant processing when content hasn't changed
    - Standard HTTP caching mechanism supported by all HTTP clients
    - Learn more: [MDN: HTTP Conditional Requests](https://developer.mozilla.org/en-US/docs/Web/HTTP/Conditional_requests)

    ### Explicit Content Change Detection

    When your CMS publishes a page update, call the normal endpoint with a strict JSON Boolean:

    ```json
    {
      "url": "https://example.com/page",
      "content_changed": true
    }
    ```

    This bypasses the existing-record/cache fast path, fetches the page again and regenerates JSON-LD. Do not combine `content_changed: true` with `html`; supplied HTML is already authoritative and continues to use the existing HTML path.

    An organization can configure a delay from 0 to 1,440 minutes. A delay of 0 queues the refresh immediately. A positive delay schedules it once before the normal FIFO worker. Repeated notifications for the same normalized URL are coalesced: the first accepted notification fixes the due time, later notifications return `deduplicated: true` and do not create another queue message or schedule. A notification received while processing causes at most one follow-up refresh.

    ### Recommended Flow:
    1. Check local cache for ETag and JSON-LD data
    2. Make POST request with `If-None-Match` header containing cached ETag
    3. Handle 412 response by returning cached data (ETag still valid)
    4. Handle 200 response by caching new ETag and JSON-LD with 1-week TTL
    5. Handle errors by returning cached data or empty output (silent degradation)

    ## Processing Model

    JSON-LD generation is **asynchronous**. When you submit a URL:

    1. **201 Created**: The URL is queued for processing (first-time submission)
    2. **202 Accepted**: The record exists but its JSON-LD has not been generated yet (still processing)
    3. **200 OK**: Generated JSON-LD exists and is returned in full (check the record's `status` field)

    Processing typically takes 1-3 minutes depending on page complexity and queue depth.

    ### Response Body Shapes

    The response body shape depends on the HTTP status code — **do not assume a uniform `status` field across all responses**:

    | HTTP code | Body shape | `status` field contains |
    |-----------|------------|-------------------------|
    | **200 OK** | Full record (`hash`, `url`, `jsonld`, `etag`, ...) | Record status **string**: `ready`, `updating`, `failed`, ... |
    | **201 Created** | Standard creation body, or `ContentChangeRefreshAccepted` when `content_changed: true` created the record | `processing` for standard creation; `queued` or `scheduled` for a change signal |
    | **202 Accepted** | RFC 9457 Problem for passive processing, or `ContentChangeRefreshAccepted` for an accepted change signal | Numeric `202` in the Problem body; lifecycle state in the change-signal body |
    | **4xx / 5xx** | RFC 9457 Problem (`type`, `title`, `status`, `detail`) | The **numeric** HTTP status code (e.g., `400`, `429`) |

    To handle responses reliably, switch on the **HTTP status code of the response first**, then interpret the body using the shape that belongs to that code.

    ### Record Status Lifecycle

    The `status` field inside **200 responses** (and list items) reflects the record's processing lifecycle:

    - `created`: Queued for processing, JSON-LD generation hasn't started yet
    - `updating`: Currently being (re)processed
    - `ready`: JSON-LD is available and ready to use
    - `failed`: Generation failed (e.g., invalid page, unreachable URL). This is a terminal record state delivered with **HTTP 200** — it is unrelated to `400 Bad Request` errors, which indicate an invalid API request.

    **Note:** the `http_status_code` field in 200 responses is the HTTP status the crawler received **from your page** during the last crawl (e.g., `200`, `404`) — it is **not** the status code of the API response you are reading. The HTTP status of the API response itself is available in the response status line and, for Problem bodies, duplicated in the numeric `status` field.

    For newly created records or records still being processed (201/202 responses), poll the **GET /api/v1/jsonld/{hash}** endpoint. It returns **202 Accepted** while processing continues and **200 OK** once the JSON-LD is available.

    ## Rate Limiting

    All endpoints are rate-limited per organization. Each response includes rate limit headers to help you track your usage.

    ### Rate Limit Headers

    ```http
    RateLimit-Limit: 100        # Maximum requests allowed in the current window
    RateLimit-Remaining: 75     # Requests remaining in the current window
    RateLimit-Reset: 3600       # Seconds until the rate limit window resets
    ```

    ### Handling Rate Limits

    **429 Too Many Requests Response:**
    ```json
    {
      "type": "https://enhancely.ai/problems/rate-limit-exceeded",
      "title": "Rate Limit Exceeded",
      "status": 429,
      "detail": "You have exceeded your rate limit. Please try again later."
    }
    ```

    ### Best Practices for Rate Limit Management

    **1. Monitor Rate Limit Headers**

    Check `RateLimit-Remaining` and `RateLimit-Reset` headers to track usage and implement proactive backoff when limits are approaching.

    **2. Implement Retry Logic**

    For 429 responses, wait for the number of seconds indicated by the `RateLimit-Reset` header before retrying. For 5xx server errors, use exponential backoff (e.g., 1s, 2s, 4s).

    **3. Use Silent Degradation**

    When rate limited or encountering errors, return cached data or empty output rather than breaking page rendering.

    ## Error Handling

    The API uses standard HTTP status codes and RFC 7807 Problem Details format for errors.

    ### Key Status Codes

    **Success States:**
    - **200 OK** - JSON-LD ready and returned
    - **201 Created** - URL queued for first-time processing
    - **202 Accepted** - Processing in progress

    **Cache States:**
    - **304 Not Modified** (GET) / **412 Precondition Failed** (POST) - Use cached data

    **Client Errors (4xx):**
    - **400** - Invalid URL or malformed request
    - **401** - Missing/invalid API key
    - **403** - Plan limit or domain validation limit exceeded
    - **404** - Resource doesn't exist
    - **415** - Wrong Content-Type header
    - **429** - Rate limit exceeded or monthly generation limit reached

    **Server Errors (5xx):**
    - **500/502/503** - Retry with exponential backoff, use cached data

    ### Error Response Format

    ```json
    {
      "type": "https://enhancely.ai/problems/rate-limit-exceeded",
      "title": "Rate Limit Exceeded",
      "status": 429,
      "detail": "You have exceeded your rate limit. Please try again later."
    }
    ```

    All error responses — and the passive `202 Accepted` still-processing response — use this RFC 9457 Problem shape with the same four fields: `type` (URI identifying the problem), `title` (short summary), `status` (**numeric** HTTP status code, duplicating the response status line), and `detail` (human-readable explanation). An accepted `content_changed: true` request instead returns the documented `ContentChangeRefreshAccepted` body. Some problems add extra fields (e.g., `limit`, `remaining`, `resetAt` on monthly-limit errors).

    ### Request IDs

    Every response carries an `X-Request-Id` header (UUID). Problem bodies additionally include the same value in the `instance` field. Include this ID when reporting issues to Enhancely support — it lets us find the exact request in our logs.

    ### Best Practices

    - **Silent Degradation**: Return cached data or empty output on errors—never break page rendering
    - **Cache on Success**: Only cache 200 responses with ETag
    - **Use Cache on 412/5xx/429**: Return cached data when receiving these status codes
    - **Don't Retry Client Errors**: Log and return empty for 400/401/404
    - **Monitor in Production**: Use tools like Sentry or New Relic

servers:
  - url: https://app.enhancely.ai
    description: API V1
tags:
  - name: JSON-LD Endpoints
    description: |
      Endpoints for generating and retrieving Schema.org JSON-LD structured data from web page URLs.

      These endpoints enable automatic creation of rich structured data that helps search engines, AI platforms, and AI search tools better understand and represent your content.
x-tagGroups:
  - name: Enhancely API
    tags:
      - JSON-LD Endpoints

paths:
  /api/v1/jsonld:
    get:
      tags: [ JSON-LD Endpoints ]
      summary: List JSON-LD records for all domains in your project
      description: |
        Returns a paginated list of JSON-LD records across all domains in the authenticated project.

        **Key Features:**
        - Cursor-based pagination with configurable page size
        - Filterable by hash, URL, status, ETag, readonly, and timestamps
        - Efficient project-level index lookup

      operationId: listJsonLd
      security:
        - BearerAuth: [ ]
      parameters:
        - in: query
          name: limit
          required: false
          description: |
            Maximum number of records per page. Default: 100, Max: 1000.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: next_token
          required: false
          description: |
            Pagination cursor from a previous response. Pass this to retrieve the next page of results.
          schema:
            type: string
        - in: query
          name: hash
          required: false
          description: Filter by exact hash (MD5 of normalized URL).
          schema:
            type: string
        - in: query
          name: jsonld_id
          required: false
          description: Filter by exact JSON-LD record ID (`jsonld_id` as returned in list items).
          schema:
            type: string
        - in: query
          name: domain_id
          required: false
          description: |
            Filter to a single domain. Must be a domain ID belonging to the authenticated project (returns `400` otherwise). Recommended for large projects — it uses the domain index for efficient pagination.
          schema:
            type: string
        - in: query
          name: sort
          required: false
          description: Sort field. Note that sort fields use camelCase (unlike the snake_case filter parameters).
          schema:
            type: string
            enum: [url, createdAt, updatedAt, status, crawledAt, httpStatusCode]
            default: createdAt
        - in: query
          name: order
          required: false
          description: Sort direction.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - in: query
          name: url
          required: false
          description: |
            Filter by URL. The hostname is used to narrow to the matching domain, then exact URL match is applied.
          schema:
            type: string
        - in: query
          name: status
          required: false
          description: Filter by processing status.
          schema:
            $ref: '#/components/schemas/JsonLdStatus'
        - in: query
          name: etag
          required: false
          description: |
            Filter by ETag value. Use `*` to match records that have any ETag (i.e., have been processed at least once).
          schema:
            type: string
        - in: query
          name: readonly
          required: false
          description: Filter by readonly status.
          schema:
            type: boolean
        - in: query
          name: created_at
          required: false
          description: Filter records created after this timestamp (ISO 8601).
          schema:
            type: string
            format: date-time
        - in: query
          name: updated_at
          required: false
          description: Filter records updated after this timestamp (ISO 8601).
          schema:
            type: string
            format: date-time
        - in: query
          name: crawled_at
          required: false
          description: Filter records crawled after this timestamp (ISO 8601).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated list of JSON-LD records.
          headers:
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimit-Limit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimit-Remaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JsonLdListItem'
                  pagination:
                    type: object
                    required:
                      - count
                      - limit
                    properties:
                      count:
                        type: integer
                        description: Number of records in this page.
                      limit:
                        type: integer
                        description: Requested page size.
                      next_token:
                        type: string
                        description: Cursor for the next page. Absent when there are no more results.
              example:
                data:
                  - jsonld_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    hash: "7c165c13f93d7ca168bcfbd73cf563e3"
                    url: "https://example.com/page"
                    domain_id: "d1e2f3a4-b5c6-7890-abcd-ef1234567890"
                    project_id: "p1r2o3j4-e5c6-7890-abcd-ef1234567890"
                    organization_id: "o1r2g3a4-n5i6-7890-abcd-ef1234567890"
                    etag: "a1b2c3d4e5f6"
                    crawled_at: "2025-01-16T14:30:00Z"
                    http_status_code: 200
                    status: "ready"
                    readonly: false
                    redirected_from_urls: ["https://example.com/old-page"]
                    redirect_target_hash: null
                    redirect_target_url: null
                    redirect_http_status: null
                    created_at: "2025-01-15T10:00:00Z"
                    updated_at: "2025-01-16T14:30:00Z"
                  - jsonld_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    hash: "e4d909c290d0fb1ca068ffaddf22cbd0"
                    url: "https://example.com/about"
                    domain_id: "d1e2f3a4-b5c6-7890-abcd-ef1234567890"
                    project_id: "p1r2o3j4-e5c6-7890-abcd-ef1234567890"
                    organization_id: "o1r2g3a4-n5i6-7890-abcd-ef1234567890"
                    etag: "b2c3d4e5f6a7"
                    crawled_at: "2025-01-16T15:00:00Z"
                    http_status_code: 200
                    status: "ready"
                    readonly: false
                    redirected_from_urls: []
                    redirect_target_hash: null
                    redirect_target_url: null
                    redirect_http_status: null
                    created_at: "2025-01-15T10:05:00Z"
                    updated_at: "2025-01-16T15:00:00Z"
                pagination:
                  count: 2
                  limit: 100
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/LimitExceeded'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [ JSON-LD Endpoints ]
      summary: Generate or retrieve JSON-LD for a URL (Primary Integration Endpoint)
      description: |
        **Recommended endpoint for CMS plugins and website integrations.**

        Submits a URL for JSON-LD generation or retrieves existing data if already processed. Automatically creates new records if they don't exist.

        **Response Codes:**
        - **200 OK** - JSON-LD exists; full record body (check `status`: `ready`, `updating`, or `failed`)
        - **201 Created** - URL queued for first-time processing. Standard requests return the processing body; a `content_changed: true` request that creates the record returns `ContentChangeRefreshAccepted`.
        - **202 Accepted** - A standard request is still processing (RFC 9457 Problem body), or a content-change refresh was accepted/coalesced (`ContentChangeRefreshAccepted`).
        - **403 Forbidden** - Plan limit exceeded or domain not validated
        - **409 Conflict** - A content-change refresh targets a readonly or ignored record
        - **412 Precondition Failed** - ETag matches, use cached data
        - **429 Too Many Requests** - Monthly generation limit reached (includes `Retry-After` header)
        - **503 Service Unavailable** - The content-change orchestrator could not confirm durable dispatch; retry with backoff

        Note that the body shape differs per status code — see the *Processing Model → Response Body Shapes* section above.

        **Key Features:**
        - Asynchronous processing (typically a few minutes for new URLs)
        - ETag-based conditional requests for efficient caching
        - Supports complex URLs in request body (no query string limits)
        - Optionally accepts `html` in the request body to skip crawling
        - Accepts `content_changed: true` from CMS publish hooks to force a fresh crawl and coalesce duplicates

      operationId: postJsonLd
      security:
        - BearerAuth: [ ]
      parameters:
        - in: header
          name: If-None-Match
          required: false
          description: |
            Optional. The ETag value from a previous response. If provided and matches the current ETag, returns `412 Precondition Failed`.
          schema:
            type: string
          example: "a1b2c3d4e5f6"
        - in: header
          name: Accept
          required: false
          description: |
            Optional. Specify `application/ld+json` to receive only the JSON-LD content without wrapper metadata. Defaults to `application/json` which includes metadata fields (status, etag, hash, etc.).

            **Note:** the header value must be exactly `application/ld+json` — media type lists or parameters (e.g. `application/ld+json, */*` or `;charset=utf-8`) are treated as `application/json`.
          schema:
            type: string
            enum:
              - application/json
              - application/ld+json
          example: "application/json"
      requestBody:
        $ref: '#/components/requestBodies/JsonLdRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/CreatedJsonLd'
        '202':
          $ref: '#/components/responses/AcceptedOrContentChangeJsonLd'
        '200':
          $ref: '#/components/responses/OkJsonLd'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/LimitExceeded'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType415'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/jsonld/{hash}:
    get:
      tags: [ JSON-LD Endpoints ]
      summary: Retrieve a specific JSON-LD document by URL hash
      description: |
        Retrieves JSON-LD for a URL using its MD5 hash. Primarily used for polling processing status after POST returns 201/202.

        **Primary use cases:**
        - Polling processing status after POST returns 201/202
        - Direct retrieval when you have the MD5 hash
        - ETag-based caching (returns 304 when content unchanged)

        **Special Headers:**
        - Send `Cache-Control: no-cache` to bypass the server-side Redis cache and force a fresh database lookup (useful for debugging).

        **URL Hash Calculation:**

        The `hash` parameter is the MD5 hash (lowercase hexadecimal) of the **normalized** URL. Normalization applies these steps before hashing:

        1. Force the `https:` scheme
        2. Strip query parameters
        3. Strip the hash/fragment
        4. Remove a trailing slash

        ```javascript
        import crypto from 'crypto';

        function normalizeUrl(url) {
          const u = new URL(url);
          u.protocol = 'https:';
          u.search = '';
          u.hash = '';
          const s = u.toString();
          return s.endsWith('/') ? s.slice(0, -1) : s;
        }

        const hash = crypto.createHash('md5').update(normalizeUrl('https://example.com/page')).digest('hex');
        // Result: "7c165c13f93d7ca168bcfbd73cf563e3"
        ```

        **Recommended:** instead of computing the hash yourself, use the `hash` field returned by `POST /api/v1/jsonld` (present in 200 and 201 responses) — it is always the canonical hash, including after redirect resolution.

        **Alternative:** the path parameter also accepts a URL-encoded absolute URL instead of an MD5 hash. The server normalizes and hashes it for you: `GET /api/v1/jsonld/https%3A%2F%2Fexample.com%2Fpage`.

        **Polling etiquette:** repeatedly requesting hashes that do not exist (404) triggers a temporary block — after excessive 404s the endpoint returns `429 Too Many Requests` (title *Too Many Not Found Requests*) with a `Retry-After: 60` header. Verify your hashes and reduce polling frequency if you hit this.

        **Response Codes:**
        - **200 OK** - JSON-LD returned with metadata (includes `status` field)
        - **202 Accepted** - Record exists but JSON-LD generation hasn't completed yet; body is an RFC 9457 Problem with numeric `status: 202`. Keep polling.
        - **304 Not Modified** - Content unchanged (when `If-None-Match` header matches ETag)
        - **403 Forbidden** - Subscription suspended (payment failed)
        - **404 Not Found** - Hash doesn't exist (use POST to create)
        - **429 Too Many Requests** - Rate limit exceeded, or too many polls for nonexistent hashes (see *Polling etiquette* above)

        **ETag behavior while processing:**
        - While a record is being processed for the **first time** it has no ETag yet — `If-None-Match` has no effect and the endpoint keeps returning `202 Accepted` until processing completes.
        - During **regeneration** of an existing record, the previous ETag stays valid: a matching `If-None-Match` returns `304 Not Modified` until the new version replaces it. A non-matching (or absent) `If-None-Match` returns `200 OK` with the current content and `status: "updating"`.

      operationId: getJsonLdById
      security:
        - BearerAuth: [ ]
      parameters:
        - in: path
          name: hash
          required: true
          description: |
            MD5 of the absolute URL (32 lowercase hexadecimal characters).
            Example: `7c165c13f93d7ca168bcfbd73cf563e3`.
          schema:
            type: string
            pattern: '^[a-f0-9]{32}$'
        - in: header
          name: If-None-Match
          required: false
          description: |
            Optional. Return `304 Not Modified` if the supplied ETag matches the current resource ETag.
          schema:
            type: string
          example: "a1b2c3d4e5f6"
        - in: header
          name: Cache-Control
          required: false
          description: |
            Optional. Send `no-cache` to bypass the server-side Redis cache and force a fresh database lookup. Useful for debugging or verifying that regeneration has completed.
          schema:
            type: string
          example: "no-cache"
        - in: header
          name: Accept
          required: false
          description: |
            Optional. Specify `application/ld+json` to receive only the JSON-LD content without wrapper metadata. Defaults to `application/json` which includes metadata fields (status, etag, hash, etc.).

            **Note:** the header value must be exactly `application/ld+json` — media type lists or parameters (e.g. `application/ld+json, */*` or `;charset=utf-8`) are treated as `application/json`.
          schema:
            type: string
            enum:
              - application/json
              - application/ld+json
          example: "application/json"
      responses:
        '200':
          $ref: '#/components/responses/OkJsonLd'
        '202':
          $ref: '#/components/responses/AcceptedJsonLd'
        '304':
          $ref: '#/components/responses/NotModified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/LimitExceeded'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        **Required.** Standard HTTP Bearer token authentication. Include your project API key in the `Authorization` header as `Bearer YOUR_API_KEY`. Project API keys use the format `sk-...`.

  headers:
    X-Request-Id:
      description: HTTP request correlation ID. Include it when contacting support.
      schema:
        type: string
    RateLimit-Limit:
      description: Maximum requests in current window. The literal string `none` when no rate limit is configured for the organization.
      schema:
        type: string
        example: "100"
    RateLimit-Remaining:
      description: Remaining requests in current window.
      schema:
        type: integer
        minimum: 0
    RateLimit-Reset:
      description: Seconds remaining until the rate limit window resets.
      schema:
        type: integer
        minimum: 0
  schemas:
    JsonLdRequest:
      type: object
      description: Payload for JSON-LD generation.
      additionalProperties: false
      required: [url]
      allOf:
        - not:
            description: "`content_changed: true` and `html` are mutually exclusive."
            required: [html, content_changed]
            properties:
              html: {}
              content_changed:
                const: true
      properties:
        url:
          type: string
          format: uri
          description: |
            The target page URL to generate JSON-LD for.
            Example: `https://example.com/blog/automatic-jsonld-with-enhancely`.
        html:
          type: string
          description: |
            Optional. Raw HTML content of the page. When provided, the crawler will use this HTML instead of fetching the page, allowing you to generate JSON-LD for pages that require JavaScript rendering or are behind authentication.

            **Limits:** Max 5 MB uncompressed; max 350 KB after server-side gzip compression (inline `data:` URIs and inline SVGs are stripped before the compressed check, so realistic page HTML rarely hits this limit).
        content_changed:
          type: boolean
          description: |
            Optional strict JSON Boolean. Missing or `false` preserves the existing cache-first behavior. Set to `true` only after the source page was published and must be fetched and regenerated again.

            `true` bypasses the existing-record/cache fast path and cannot be combined with `html`. Duplicate change signals for the same normalized URL are coalesced. The organization-level delay determines whether the accepted refresh is queued immediately or scheduled once.

    ContentChangeRefreshAccepted:
      type: object
      description: |
        A confirmed content-change refresh operation. This body is returned only when the request contains `content_changed: true`.

        `request_id` identifies the stable logical refresh claim used for first-wins deduplication. Deduplicated callers receive the first claim's value. It is distinct from the `X-Request-Id` header, which identifies the individual HTTP request.
      additionalProperties: false
      required:
        - status
        - deduplicated
        - hash
        - url
        - jsonld_id
        - request_id
        - delay_seconds
      properties:
        status:
          type: string
          enum: [queued, scheduled, processing]
          description: Current state of the accepted refresh claim.
        deduplicated:
          type: boolean
          description: Whether this request was coalesced into an already active refresh claim.
        hash:
          type: string
          pattern: '^[a-f0-9]{32}$'
          description: MD5 hash of the normalized URL. Use it with `GET /api/v1/jsonld/{hash}`.
        url:
          type: string
          format: uri
          description: Normalized source URL without query parameters or fragment.
        jsonld_id:
          type: string
          description: Identifier of the JSON-LD target being refreshed.
        request_id:
          type: string
          description: Stable logical refresh-claim identifier; not the HTTP `X-Request-Id`.
        scheduled_for:
          type: string
          format: date-time
          description: First-wins target time. Present only for a delayed refresh.
        delay_seconds:
          type: integer
          minimum: 0
          maximum: 86400
          multipleOf: 60
          description: Organization delay captured when this refresh claim was created.

    JsonLdListItem:
      type: object
      description: Summary of a JSON-LD record returned in list responses.
      required:
        - jsonld_id
        - hash
        - url
        - domain_id
        - project_id
        - organization_id
        - status
      properties:
        jsonld_id:
          type: string
          description: Unique identifier for this JSON-LD record.
        hash:
          type: string
          description: MD5 hash of the normalized URL.
        url:
          type: string
          description: The source URL.
        domain_id:
          type: string
          description: ID of the domain this record belongs to.
        project_id:
          type: string
          description: ID of the project this record belongs to.
        organization_id:
          type: string
          description: ID of the organization this record belongs to.
        etag:
          type: ['string', 'null']
          description: ETag for caching. Null if the record hasn't been processed yet.
        crawled_at:
          type: ['string', 'null']
          format: date-time
          description: When the URL was last crawled.
        http_status_code:
          type: ['integer', 'null']
          description: |
            HTTP status code the crawler received **from your page** when it was last crawled.
            This is **not** the status code of this API response.
        status:
          $ref: '#/components/schemas/JsonLdStatus'
        readonly:
          type: ['boolean', 'null']
          description: Whether this record is read-only (protected from regeneration).
        redirected_from_urls:
          type: array
          items:
            type: string
            format: uri
          description: Original URLs that redirected to this final URL.
        redirect_target_hash:
          type: ['string', 'null']
          description: MD5 hash of the redirect target record. Present when this record is a redirect pointer.
        redirect_target_url:
          type: ['string', 'null']
          description: URL of the redirect target record. Present when this record is a redirect pointer.
        redirect_http_status:
          type: ['integer', 'null']
          description: HTTP redirect status code (e.g., 301, 302). Present when this record is a redirect pointer.
        created_at:
          type: string
          format: date-time
          description: When this record was created.
        updated_at:
          type: string
          format: date-time
          description: When this record was last updated.

    JsonLdStatus:
      type: string
      description: |
        Processing status of a JSON-LD record.
        - `created`: Initial status when record is created but processing hasn't started
        - `updating`: Document is actively being processed by the AI crawler
        - `failed`: JSON-LD generation failed (e.g., invalid page, unreachable URL)
        - `ready`: Successfully generated JSON-LD document (has etag and content)
        - `ignored`: Record has been marked as ignored and will not be regenerated
        - `generation_limit_reached`: Monthly generation limit was reached during processing
        - `redirect`: Record is a redirect pointer to another URL (see `redirect_target_hash`)
      enum:
        - created
        - updating
        - failed
        - ready
        - ignored
        - generation_limit_reached
        - redirect

    Problem:
      type: object
      description: Standard error object in RFC 9457 style.
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the error type.
        title:
          type: string
          description: Short error summary.
        status:
          type: integer
          description: HTTP status code.
        detail:
          type: string
          description: Human-readable error details.
        instance:
          type: string
          description: Request ID (UUID) identifying this error occurrence. Matches the `X-Request-Id` response header — include it when contacting support.
        code:
          type: string
          description: Optional machine-readable error code.
      additionalProperties: true
      example:
        type: "https://enhancely.ai/problems/bad-request"
        title: "Bad Request"
        status: 400
        detail: "Invalid JSON in request body"

  requestBodies:
    JsonLdRequestBody:
      description: |
        **Required.** JSON request body with the URL to generate JSON-LD for.
        The `Content-Type` header must be `application/json`.
        Optionally include `html` to provide page content directly (skip crawling).
        Set `content_changed` to the strict Boolean `true` after a CMS publish event to request a fresh crawl and regeneration. It cannot be combined with `html`.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonLdRequest'
          examples:
            url-only:
              summary: Standard request (URL only)
              value:
                url: "https://example.com/blog/automatic-jsonld-with-enhancely"
            with-html:
              summary: With custom HTML (skip crawling)
              value:
                url: "https://example.com/blog/automatic-jsonld-with-enhancely"
                html: "<html><head><title>My Page</title></head><body><h1>Content</h1></body></html>"
            content-changed:
              summary: Report a published page change
              value:
                url: "https://example.com/blog/automatic-jsonld-with-enhancely"
                content_changed: true

  responses:
    CreatedJsonLd:
      description: |
        Record created and the crawler is now processing the requested resource. Poll the `GET /api/v1/jsonld/{hash}` endpoint to check when processing completes.

        A standard request returns the legacy processing body. When `content_changed: true` creates the target, the response instead uses `ContentChangeRefreshAccepted` and includes `Location`.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
        Location:
          description: Polling URL. Present for a content-change request that created the target.
          schema:
            type: string
      content:
        application/json:
          schema:
            oneOf:
              - type: object
                required: [status, message]
                properties:
                  status:
                    type: string
                    enum: [processing]
                    description: Fixed literal `processing`. Not a record lifecycle status.
                  message:
                    type: string
                    description: Human-readable status message.
                  hash:
                    type: string
                    description: MD5 hash of the (possibly redirected) final URL.
                  url:
                    type: string
                    description: The final URL after redirect resolution. May differ from the submitted URL.
              - $ref: '#/components/schemas/ContentChangeRefreshAccepted'
          examples:
            standard-create:
              summary: Standard first-time creation
              value:
                status: "processing"
                message: "Record created and the crawler is now processing the requested resource. Please try again later."
                hash: "7c165c13f93d7ca168bcfbd73cf563e3"
                url: "https://example.com/page"
            content-change-create:
              summary: Content-change signal created the target
              value:
                status: "queued"
                deduplicated: false
                hash: "7c165c13f93d7ca168bcfbd73cf563e3"
                url: "https://example.com/page"
                jsonld_id: "refresh-4acaa0d3"
                request_id: "08fef82b-b01d-476d-a4b3-7f061c14424d"
                delay_seconds: 0

    AcceptedOrContentChangeJsonLd:
      description: |
        Standard POST requests return an RFC 9457 Problem while the crawler is still processing. A request with `content_changed: true` returns `ContentChangeRefreshAccepted` after the refresh was durably queued, scheduled or coalesced.

        Switch on the presence of `type`: Problem bodies contain numeric `status: 202`; content-change bodies contain the lifecycle state `queued`, `scheduled` or `processing`.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
        Location:
          description: Polling URL. Present for accepted content-change refreshes.
          schema:
            type: string
        Retry-After:
          description: Remaining seconds until `scheduled_for`. Present only for delayed content-change refreshes.
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/Problem'
              - $ref: '#/components/schemas/ContentChangeRefreshAccepted'
          examples:
            still-processing:
              summary: Passive standard processing response
              value:
                type: "https://enhancely.ai/problems/still-processing"
                title: "Still Processing"
                status: 202
                detail: "The crawler is still processing the requested resource. Please try again later."
            refresh-scheduled:
              summary: Delayed content-change refresh accepted
              value:
                status: "scheduled"
                deduplicated: false
                hash: "7c165c13f93d7ca168bcfbd73cf563e3"
                url: "https://example.com/page"
                jsonld_id: "f43ff420-44f8-46fd-a4dc-c18cb52a6018"
                request_id: "08fef82b-b01d-476d-a4b3-7f061c14424d"
                scheduled_for: "2026-07-17T15:00:00.000Z"
                delay_seconds: 3600
            refresh-deduplicated:
              summary: Duplicate signal coalesced into the first refresh
              value:
                status: "scheduled"
                deduplicated: true
                hash: "7c165c13f93d7ca168bcfbd73cf563e3"
                url: "https://example.com/page"
                jsonld_id: "f43ff420-44f8-46fd-a4dc-c18cb52a6018"
                request_id: "08fef82b-b01d-476d-a4b3-7f061c14424d"
                scheduled_for: "2026-07-17T15:00:00.000Z"
                delay_seconds: 3600

    AcceptedJsonLd:
      description: |
        The crawler is still processing the requested resource. Returned while polling `GET /api/v1/jsonld/{hash}`.

        The body is an RFC 9457 Problem object. Its `status` field contains the numeric HTTP status code `202`, not a record lifecycle status string.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://enhancely.ai/problems/still-processing"
            title: "Still Processing"
            status: 202
            detail: "The crawler is still processing the requested resource. Please try again later."

    NotModified:
      description: Not modified (ETag matched; no body returned).
      headers:
        ETag:
          description: Entity tag for conditional requests.
          schema: { type: string }

    NotFound:
      description: Not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Problem' }
          example:
            type: "https://enhancely.ai/problems/not-found"
            title: "Not Found"
            status: 404
            detail: "The requested JSON-LD resource was not found"

    OkJsonLd:
      description: JSON-LD returned; already existed or recently generated.
      headers:
        ETag:
          description: Entity tag for conditional requests. Only meaningful when the record has been successfully generated (the body's `etag` field is non-null).
          schema: { type: string }
        X-Redis-Cache:
          description: Whether the response was served from Redis cache (`HIT`) or the database (`MISS`).
          schema:
            type: string
            enum: [HIT, MISS]
        X-JsonLd-Status:
          description: Present only when the record status is `ignored`. Value is `ignored`.
          schema:
            type: string
        X-Redirect-From-Hash:
          description: Present when a redirect was followed. Contains the MD5 hash of the originally requested URL.
          schema:
            type: string
        X-Redirect-To-Hash:
          description: Present when a redirect was followed. Contains the MD5 hash of the final (canonical) URL.
          schema:
            type: string
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
      content:
        application/ld+json:
          schema:
            type: object
            additionalProperties: true
          example:
            "@context": "https://schema.org"
            "@graph":
              - "@type": "WebPage"
                "@id": "https://example.com/lecture-12"
                name: "Lecture 12: Graphs, networks, incidence matrices"
                description: "These video lectures of Professor Gilbert Strang teaching 18.06 were recorded in Fall 1999 and do not correspond precisely to the current edition of the textbook."
                publisher:
                  "@type": "CollegeOrUniversity"
                  name: "MIT OpenCourseWare"
                license: "http://creativecommons.org/licenses/by-nc-sa/3.0/us/deed.en_US"
        application/json:
          schema:
            type: object
            required:
              - hash
              - url
              - jsonld
              - etag
              - crawled_at
              - status
            properties:
              hash:
                type: string
                description: MD5 hash of the normalized URL
              url:
                type: string
                description: The source URL
              jsonld:
                type: object
                additionalProperties: true
                description: >-
                  The JSON-LD structured data object. Empty object (`{}`) when no
                  JSON-LD has been generated (e.g., status `failed`).
              etag:
                type: ['string', 'null']
                description: >-
                  ETag for caching. `null` when the record has never been
                  successfully generated (e.g., status `failed`).
              crawled_at:
                type: ['string', 'null']
                format: date-time
                description: When the URL was last crawled (null if not crawled yet)
              http_status_code:
                type: ['integer', 'null']
                description: |
                  HTTP status code the crawler received **from your page** when it was last crawled (e.g., 200, 404).
                  This is **not** the status code of this API response.
              status:
                $ref: '#/components/schemas/JsonLdStatus'
              readonly:
                type: ['boolean', 'null']
                description: Whether this record is read-only (protected from regeneration)
              redirected_from_urls:
                type: array
                items:
                  type: string
                  format: uri
                description: Original URLs that redirected to this final URL. Empty or absent when no redirect occurred.
          example:
            hash: "7c165c13f93d7ca168bcfbd73cf563e3"
            url: "https://example.com/lecture-12"
            jsonld:
              "@context": "https://schema.org"
              "@graph":
                - "@type": "WebPage"
                  "@id": "https://example.com/lecture-12"
                  name: "Lecture 12: Graphs, networks, incidence matrices"
                  description: "These video lectures of Professor Gilbert Strang teaching 18.06 were recorded in Fall 1999 and do not correspond precisely to the current edition of the textbook."
                  publisher:
                    "@type": "CollegeOrUniversity"
                    name: "MIT OpenCourseWare"
                  license: "http://creativecommons.org/licenses/by-nc-sa/3.0/us/deed.en_US"
            etag: "a1b2c3d4e5f6"
            crawled_at: "2025-01-16T14:30:00Z"
            http_status_code: 200
            status: "ready"
            readonly: false

    BadRequest:
      description: Malformed request, invalid URL, or URL hostname not registered in the project.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalid-json:
              summary: Malformed request body
              value:
                type: "https://enhancely.ai/problems/bad-request"
                title: "Bad Request"
                status: 400
                detail: "Invalid JSON in request body"
            hostname-mismatch:
              summary: URL hostname not registered in the project
              value:
                type: "https://enhancely.ai/problems/hostname-mismatch"
                title: "Hostname Mismatch"
                status: 400
                detail: 'URL hostname "shop.example.com" does not match any domain in this project. Registered domains: example.com. Register "shop.example.com" as a domain in your project to use this hostname.'
            denylist:
              summary: URL rejected by denylist (e.g., login/cart/search pages)
              value:
                type: "https://enhancely.ai/problems/bad-request"
                title: "Bad Request"
                status: 400
                detail: "URL rejected by denylist"
            invalid-content-changed:
              summary: "`content_changed` is not a JSON Boolean"
              value:
                type: "https://enhancely.ai/problems/bad-request"
                title: "Bad Request"
                status: 400
                detail: "content_changed must be a boolean"
            conflicting-content-source:
              summary: Change signal combined with authoritative HTML
              value:
                type: "https://enhancely.ai/problems/bad-request"
                title: "Bad Request"
                status: 400
                detail: "content_changed=true cannot be combined with html"
            invalid-filter:
              summary: Invalid query parameter on the list endpoint
              value:
                type: "https://enhancely.ai/problems/bad-request"
                title: "Bad Request"
                status: 400
                detail: "Invalid readonly filter: expected true or false"

    Unauthorized:
      description: Missing or invalid bearer token.
      headers:
        WWW-Authenticate:
          description: Bearer authentication required.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://enhancely.ai/problems/unauthorized"
            title: "Unauthorized"
            status: 401
            detail: "Missing or invalid bearer token"

    PreconditionFailed:
      description: Precondition Failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://enhancely.ai/problems/precondition-failed"
            title: "Precondition Failed"
            status: 412
            detail: "The precondition given in the request header fields evaluated to false"

    Conflict:
      description: The content-change target is readonly or ignored and cannot be regenerated.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            readonly:
              summary: Readonly target
              value:
                type: "https://enhancely.ai/problems/refresh_readonly"
                title: "Conflict"
                status: 409
                detail: "JSON-LD record is readonly"
                code: "refresh_readonly"
            ignored:
              summary: Ignored target
              value:
                type: "https://enhancely.ai/problems/refresh_ignored"
                title: "Conflict"
                status: 409
                detail: "JSON-LD record is ignored"
                code: "refresh_ignored"

    UnsupportedMediaType415:
      description: Content-Type not supported.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://enhancely.ai/problems/unsupported-media-type"
            title: "Unsupported Media Type"
            status: 415
            detail: "Content-Type must be application/json"

    TooManyRequests:
      description: Rate limit or monthly generation limit exceeded.
      headers:
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
        Retry-After:
          description: Seconds until the monthly generation limit resets (only present for monthly limits).
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            rate-limit:
              summary: API rate limit exceeded
              value:
                type: "https://enhancely.ai/problems/rate-limit-exceeded"
                title: "Rate Limit Exceeded"
                status: 429
                detail: "You have exceeded your rate limit. Please try again later."
            monthly-limit:
              summary: Monthly generation limit reached
              value:
                type: "https://enhancely.ai/problems/monthly-limit-reached"
                title: "Monthly Limit Reached"
                status: 429
                detail: "Monthly generation limit of 1000 reached. Resets 2026-03-01T00:00:00.000Z."
                limit: 1000
                count: 1000
                remaining: 0
                resetAt: "2026-03-01T00:00:00.000Z"
            too-many-not-found:
              summary: Too many 404 polls (GET /{hash}) — includes Retry-After 60
              value:
                type: "https://enhancely.ai/problems/rate-limit-exceeded"
                title: "Too Many Not Found Requests"
                status: 429
                detail: "Too many requests for nonexistent resources. Please verify your JSON-LD hashes are correct and reduce polling frequency."

    LimitExceeded:
      description: |
        Plan limit exceeded, domain not validated, or subscription suspended.

        A suspended subscription (failed payment) blocks **every** endpoint, including the read-only `GET` endpoints — update the payment method to restore access.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            subscription-suspended:
              summary: Subscription suspended (payment failed) — affects all endpoints
              value:
                type: "https://enhancely.ai/problems/subscription-suspended"
                title: "Subscription Suspended"
                status: 403
                detail: "Your subscription payment has failed. Update your payment method at /billing to restore access."
            plan-limit:
              summary: Plan JSON-LD limit reached
              value:
                type: "https://enhancely.ai/problems/plan-limit-reached"
                title: "Plan Limit Reached"
                status: 403
                detail: "You have reached your plan's JSON-LD limit of 500. Upgrade your plan to create more entries."
            domain-validation:
              summary: Domain not validated
              value:
                type: "https://enhancely.ai/problems/domain-validation-required"
                title: "Domain Validation Required"
                status: 403
                detail: "This domain is not validated yet. You can create up to 5 JSON-LDs until validation succeeds."

    ServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://enhancely.ai/problems/server-error"
            title: "Internal Server Error"
            status: 500
            detail: "An unexpected server error occurred"

    ServiceUnavailable:
      description: |
        The content-change orchestrator could not confirm durable queue or schedule acceptance. No successful acceptance is reported; retry after the indicated delay.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
        Retry-After:
          description: Retry delay in seconds.
          schema:
            type: integer
            enum: [30]
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: "https://enhancely.ai/problems/dispatch-failed"
            title: "Service Unavailable"
            status: 503
            detail: "Content-change refresh is temporarily unavailable"
            code: "dispatch-failed"
